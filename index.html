<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Happy Birthday Shreya ❤️</title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
</head>

<body>

<!-- Floating Hearts -->
<div id="hearts"></div>

<!-- ==========================
     WELCOME SCREEN
=========================== -->

<section id="welcomeScreen" class="screen active">

    <div class="glass">

        <h1 class="title">
            ❤️ Happy Birthday ❤️
        </h1>

        <h2 class="subtitle">
            Dear Shreya
        </h2>

        <p class="intro">

            Every beautiful memory we've created
            is hidden inside one picture.

            <br><br>

            Can you put it back together?

        </p>

        <button id="startBtn">
            Start Puzzle
        </button>

    </div>

</section>

<!-- ==========================
     PUZZLE SCREEN
=========================== -->

<section id="gameScreen" class="screen">

    <div class="topBar">

        <h2>
            Complete Our Memory ❤️
        </h2>

        <div class="progressContainer">

            <div id="progressBar"></div>

        </div>

        <p id="progressText">

            0 / 16 Pieces

        </p>

    </div>

    <div id="puzzleContainer">

        <!-- JavaScript will generate the puzzle here -->

    </div>

</section>

<!-- ==========================
     MESSAGE SCREEN
=========================== -->

<section id="messageScreen" class="screen">

    <div class="messageCard">

        <img
            src="photo.jpg"
            class="finalPhoto"
            alt="Our Photo">

        <h1>

            🎂 Happy Birthday Shreya ❤️

        </h1>

        <p id="typeWriter">

        </p>

        <button id="playVideo">

            Continue ❤️

        </button>

    </div>

</section>

<!-- ==========================
     VIDEO SCREEN
=========================== -->

<section id="videoScreen" class="screen">

    <video
        id="birthdayVideo"
        controls
        playsinline
        preload="auto">

        <source
            src="birthday.mp4"
            type="video/mp4">

    </video>

</section>

<script src="script.js"></script>

    <!-- ==========================
     LOADING OVERLAY
=========================== -->

<div id="loadingOverlay">

    <div class="loader"></div>

    <h2>
        Preparing your surprise...
    </h2>

</div>

<!-- ==========================
     AUDIO (Optional)
=========================== -->

<audio
    id="bgMusic"
    loop
    preload="auto">

    <source
        src="music.mp3"
        type="audio/mpeg">

</audio>

<!-- ==========================
     FOOTER
=========================== -->

<footer>

    Made with ❤️ by Yash

</footer>

</body>

</html>
