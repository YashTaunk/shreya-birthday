<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Happy Birthday ❤️
</title>

<link rel="stylesheet"
href="style.css">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js">
</script>

</head>

<body>

<!-- Floating Hearts -->

<div id="hearts"></div>

<!-- ===================================== -->
<!-- WELCOME SCREEN -->
<!-- ===================================== -->

<section
id="welcome"
class="screen show">

<div class="glass">

<h1>

❤️ Happy Birthday ❤️

</h1>

<h2>

Dear Shreya

</h2>

<p>

Every memory has a place.

<br><br>

Can you rebuild ours?

</p>

<button
id="startBtn">

Start Puzzle ❤️

</button>

</div>

</section>

<!-- ===================================== -->
<!-- GAME SCREEN -->
<!-- ===================================== -->

<section
id="game"
class="screen">

<div class="top">

<h2>

Rebuild Our Memory ❤️

</h2>

<div class="progressOuter">

<div id="progress">

</div>

</div>

<p id="progressText">

0 / 36 Memories Restored ❤️

</p>

<p id="milestone">

</p>

</div>

<div
id="puzzle">

</div>

</section>

<!-- ===================================== -->
<!-- REVEAL SCREEN -->
<!-- ===================================== -->

<section
id="reveal"
class="screen">

<div class="glass revealCard">

<img
id="finalPhoto"
src="photo.jpg"
alt="Our Memory">

<h1>

🎂 Happy Birthday Shreya ❤️

</h1>

<p id="message">

</p>

<button
id="watchBtn">

❤️ Watch Your Surprise

</button>

</div>

</section>

<!-- ===================================== -->
<!-- VIDEO SCREEN -->
<!-- ===================================== -->

<section
id="videoScreen"
class="screen">

<video
id="birthdayVideo"
controls
playsinline
preload="auto">

<source
src="birthday.mp4"
type="video/mp4">

</video>

</section>

<!-- ===================================== -->
<!-- LOADING SCREEN -->
<!-- ===================================== -->

<div
id="loadingScreen">

<div class="loader">

</div>

<p>

Preparing your surprise...

</p>

</div>

<script
src="script.js">

</script>

</body>

</html>
