<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Happy Birthday ❤️</title>

<link rel="stylesheet"
href="style.css">

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

</head>

<body>

<div id="background"></div>

<div id="overlay"></div>

<div id="hearts"></div>

<section id="welcome" class="show">

<div class="glass">

<h1>

❤️ Happy Birthday ❤️

</h1>

<h2>

Dear Shreya

</h2>

<p>

Every memory tells a story...

<br><br>

Today I'd like to relive one of my favourites.

</p>

<button id="startBtn">

Reveal Our Memory ❤️

</button>

</div>

</section>

<section id="memory">

<img
id="photo"
src="photo.jpg">

<div class="messageCard">

<h1>

🎂 Happy Birthday ❤️

</h1>

<p id="message">

</p>

<button id="watchBtn">

❤️ Watch Your Surprise

</button>

</div>

</section>

<section id="videoPage">

<video
id="birthdayVideo"
controls
playsinline>

<source
src="birthday.mp4"
type="video/mp4">

</video>

</section>

<script src="script.js"></script>

</body>

</html>
